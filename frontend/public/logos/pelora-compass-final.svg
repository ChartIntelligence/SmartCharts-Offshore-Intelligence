<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Pelora Compass Brand Mark</title>
  <desc id="desc">A symmetrical eight-point compass rose with metallic silver blades, navy structure, and restrained orange and cyan accents on a transparent background.</desc>

  <defs>
    <linearGradient id="silverBright" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#e8edf3"/>
      <stop offset="1" stop-color="#a3adba"/>
    </linearGradient>

    <linearGradient id="silverShade" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d7dde5"/>
      <stop offset="1" stop-color="#727f8f"/>
    </linearGradient>

    <linearGradient id="northAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7a00"/>
      <stop offset="1" stop-color="#b53a00"/>
    </linearGradient>

    <linearGradient id="southAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b6ea8"/>
      <stop offset="1" stop-color="#21c8ff"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#00101c" flood-opacity=".28"/>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#071423" stroke-width="18"/>
  <circle cx="256" cy="256" r="169" fill="none" stroke="url(#silverBright)" stroke-width="8"/>
  <circle cx="256" cy="256" r="153" fill="none" stroke="#071423" stroke-width="4" opacity=".7"/>

  <!-- Main compass -->
  <g filter="url(#shadow)" stroke="#071423" stroke-width="7" stroke-linejoin="round">
    <!-- North -->
    <path d="M256 32 L306 226 L256 256 L206 226 Z" fill="url(#silverBright)"/>
    <path d="M256 32 L256 256 L206 226 Z" fill="#f8fafc"/>
    <path d="M256 32 L270 220 L256 236 L242 220 Z" fill="url(#northAccent)" stroke-width="3"/>

    <!-- South -->
    <path d="M256 480 L306 286 L256 256 L206 286 Z" fill="url(#silverShade)"/>
    <path d="M256 480 L256 256 L306 286 Z" fill="#8f9baa"/>
    <path d="M256 480 L270 292 L256 276 L242 292 Z" fill="url(#southAccent)" stroke-width="3"/>

    <!-- East -->
    <path d="M480 256 L286 206 L256 256 L286 306 Z" fill="url(#silverBright)"/>
    <path d="M480 256 L256 256 L286 306 Z" fill="#d8dfe7"/>
    <path d="M480 256 L292 242 L276 256 L292 270 Z" fill="#22c7ff" stroke-width="3"/>

    <!-- West -->
    <path d="M32 256 L226 206 L256 256 L226 306 Z" fill="url(#silverShade)"/>
    <path d="M32 256 L256 256 L226 206 Z" fill="#f8fafc"/>
    <path d="M32 256 L220 242 L236 256 L220 270 Z" fill="#ff7100" stroke-width="3"/>
  </g>

  <!-- Intercardinal blades -->
  <g stroke="#071423" stroke-width="6" stroke-linejoin="round">
    <path d="M108 108 L236 224 L224 236 Z" fill="url(#silverBright)"/>
    <path d="M404 108 L288 236 L276 224 Z" fill="url(#silverShade)"/>
    <path d="M404 404 L276 288 L288 276 Z" fill="url(#silverBright)"/>
    <path d="M108 404 L224 276 L236 288 Z" fill="url(#silverShade)"/>
  </g>

  <!-- Center hub -->
  <circle cx="256" cy="256" r="50" fill="#071423"/>
  <circle cx="256" cy="256" r="36" fill="url(#silverBright)" stroke="#ffffff" stroke-width="4"/>
  <circle cx="256" cy="256" r="22" fill="#071423"/>
  <circle cx="256" cy="256" r="10" fill="#0d2238"/>

  <!-- Tiny orientation marks -->
  <path d="M256 68 V84" stroke="#ff7200" stroke-width="7" stroke-linecap="round"/>
  <path d="M256 428 V444" stroke="#20c7ff" stroke-width="7" stroke-linecap="round"/>
</svg>
